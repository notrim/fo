name: zen_moment
description: 禅心一刻 - 每日禅意短句App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  # iOS特定配置
  ios:
    supports-portrait: true
    supports-landscape: false
    require-full-screen: true
  
  assets:
    - assets/quotes.json